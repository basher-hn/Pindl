<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>عرض الكود VIP – Green Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* الستايل الأخضر VIP 3D المطور لصفحة العرض */
    :root {
      --primary-green: #00b894;
      --bg-color: #f0f3f7;
      --shadow-light: #ffffff;
      --shadow-dark: #d1d9e6;
    }

    body {
      background: var(--bg-color);
      font-family: 'Cairo', sans-serif;
      padding: 15px;
      margin: 0;
      color: #333;
      text-align: center;
    }

    .main-header {
      background: var(--bg-color);
      padding: 25px 15px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
      border-bottom: 4px solid var(--primary-green);
    }

    .logo-circle {
      background: var(--primary-green);
      color: white;
      font-size: 22px;
      font-weight: bold;
      width: 85px;
      height: 85px;
      margin: 10px auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 5px 5px 15px rgba(0, 184, 148, 0.3);
    }

    .card-vip {
      background: var(--bg-color);
      border-radius: 15px;
      box-shadow: 15px 15px 30px var(--shadow-dark), -15px -15px 30px var(--shadow-light);
      padding: 25px;
      margin: auto;
      max-width: 500px;
      border-right: 6px solid var(--primary-green);
      position: relative;
    }

    .badge-vip {
      position: absolute;
      top: -12px;
      left: 15px;
      background: #e74c3c;
      color: white;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
    }

    .preview-box {
      margin-bottom: 25px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
      box-shadow: inset 4px 4px 10px var(--shadow-dark);
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    pre {
      background: #2d3436;
      color: var(--primary-green);
      padding: 20px;
      border-radius: 10px;
      overflow-x: auto;
      font-size: 14px;
      direction: ltr;
      text-align: left;
      box-shadow: inset 5px 5px 15px #000;
      font-family: 'Courier New', monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .copy-btn-vip {
      background: var(--primary-green);
      color: #fff;
      border: none;
      padding: 16px;
      margin-top: 25px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      width: 100%;
      box-shadow: 6px 6px 15px var(--shadow-dark);
      transition: 0.3s;
      font-family: 'Cairo';
    }

    .copy-btn-vip:active {
      transform: scale(0.97);
      box-shadow: inset 3px 3px 8px rgba(0,0,0,0.2);
    }

    .copy-btn-vip.copied {
      background: #2ecc71;
    }

    .not-found-vip {
      text-align: center;
      padding: 40px;
      color: #777;
    }
  </style>
</head>
<body oncontextmenu="return false;">

  <div class="main-header">
    <h1 style="font-size: 26px; font-weight: 900; color: #222; margin-bottom: 10px;">
      Css•<span style="color:var(--primary-green)">Basher</span>•Wapka
    </h1>
    <div class="logo-circle">C•B•W</div>
  </div>

  <div class="card-vip" id="codeBox">
    <i class="fa fa-spinner fa-spin"></i> جاري التحميل...
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    /* 🛡️ حماية CoOoBRA VIP */
    document.onkeydown = function(e) {
      if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };

    const firebaseConfig = {
      apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
      authDomain: "soudfa-9a558.firebaseapp.com",
      databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
      projectId: "soudfa-9a558",
      storageBucket: "soudfa-9a558.appspot.com",
      messagingSenderId: "889312889458",
      appId: "1:889312889458:web:2f7086b73e5bda0328e01a"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const box = document.getElementById("codeBox");

    if (!id) {
      box.innerHTML = "<div class='not-found-vip'>لم يتم العثور على الكود 😢</div>";
    } else {
      db.ref("codes/" + id).once("value", (snapshot) => {
        if (!snapshot.exists()) {
          box.innerHTML = "<div class='not-found-vip'>الكود غير موجود أو تم حذفه ❌</div>";
          return;
        }

        const data = snapshot.val();
        box.innerHTML = `
          ${data.isNew ? "<div class='badge-vip'>NEW</div>" : ""}
          <div class="preview-box">${data.previewHTML}</div>
          <pre id="codeText">${data.cssCode}</pre>
          <button class="copy-btn-vip" id="copyBtn" onclick="copyCode()">
            <i class="fa fa-copy"></i> نسخ الكود
          </button>
        `;
      });
    }

    function copyCode() {
      const code = document.getElementById("codeText").innerText;
      const btn = document.getElementById("copyBtn");
      
      navigator.clipboard.writeText(code).then(() => {
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<i class="fa fa-check"></i> تم النسخ!`;
        btn.classList.add("copied");

        setTimeout(() => {
          btn.innerHTML = originalHTML;
          btn.classList.remove("copied");
        }, 2000);
      });
    }
  </script>

</body>
</html>
