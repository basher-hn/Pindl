<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Codes VIP – Css Basher</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&display=swap" rel="stylesheet">
  <style>
    /* الستايل الملكي الجديد VIP 3D Extreme */
    body {
      background: #0a0a0a;
      font-family: 'Cairo', sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
      color: #fff;
    }
    
    .header-section {
      background: #111;
      padding: 30px 15px;
      border-radius: 8px; /* التزام بـ 8px */
      border-bottom: 3px solid #3498db;
      box-shadow: 0 10px 20px rgba(0,0,0,0.5);
      margin-bottom: 25px;
    }

    .main-title {
      font-size: 26px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 10px;
      text-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
    }

    .logo-circle {
      background: #000;
      color: #3498db;
      font-size: 24px;
      font-weight: bold;
      width: 90px;
      height: 90px;
      margin: 10px auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #3498db;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
    }

    #codeCount {
      background: #111;
      padding: 8px 15px;
      border-radius: 8px;
      display: inline-block;
      color: #3498db;
      font-weight: bold;
      box-shadow: inset 3px 3px 6px #000;
      margin-bottom: 25px;
    }

    #codesContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #111;
      border-radius: 8px;
      padding: 20px;
      position: relative;
      border: 1px solid #1a1a1a;
      box-shadow: 10px 10px 20px #050505, -5px -5px 15px #181818;
      transition: 0.3s;
      text-align: right;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: #3498db;
    }

    .preview {
      padding: 15px;
      background: #080808;
      border-radius: 8px;
      margin-bottom: 15px;
      box-shadow: inset 4px 4px 10px #000;
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .btn {
      background: #111;
      color: #3498db;
      padding: 12px 0;
      font-weight: 900;
      border: 1px solid #3498db;
      border-radius: 8px;
      text-decoration: none;
      display: block;
      text-align: center;
      transition: 0.3s;
      box-shadow: 4px 4px 10px #080808;
    }

    .btn:hover {
      background: #3498db;
      color: #fff;
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.5);
    }

    .badge {
      background: #e74c3c;
      color: white;
      font-size: 10px;
      padding: 4px 10px;
      position: absolute;
      top: -10px;
      left: 15px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 0 10px rgba(231, 76, 60, 0.5);
    }

    .pagination {
      margin: 40px 0;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .pagination button {
      padding: 12px 25px;
      background: #111;
      color: #3498db;
      border: 1px solid #222;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 5px 5px 10px #050505;
      transition: 0.3s;
    }

    .pagination button:hover:not(:disabled) {
      background: #3498db;
      color: #fff;
    }

    .pagination button:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

</style>
</head>
<body> 

  <div class="header-section">
    <h1 class="main-title">
      Css•<span style="color:#3498db">Basher</span>•Wapka
    </h1>
    <div class="logo-circle">C•B•W</div>
  </div>

  <div id="codeCount">
    <i class="fa fa-code"></i> عدد الأكواد: <span id="totalCount">0</span>
  </div>

  <div id="codesContainer"></div>

  <div class="pagination">
    <button id="prevBtn"><i class="fa fa-chevron-right"></i> السابق</button>
    <button id="nextBtn">التالي <i class="fa fa-chevron-left"></i></button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
      authDomain: "soudfa-9a558.firebaseapp.com",
      databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
      projectId: "soudfa-9a558",
      storageBucket: "soudfa-9a558.appspot.com",
      messagingSenderId: "272066911729",
      appId: "1:272066911729:web:000fdba21e4b1d7ffcb82c"
    };

    firebase.initializeApp(firebaseConfig);

    window.addEventListener("DOMContentLoaded", function () {
      let allCodes = [];
      let currentPage = 1;
      const itemsPerPage = 10;
      const container = document.getElementById('codesContainer');

      function renderPage() {
        container.innerHTML = '';
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = allCodes.slice(start, end);

        pageItems.forEach(({ key, data }) => {
          const card = document.createElement("div");
          card.className = "card";

          const preview = document.createElement("div");
          preview.className = "preview";
          preview.innerHTML = data.previewHTML;

          const btn = document.createElement("a");
          btn.href = `copy.html?id=${key}`;
          btn.className = "btn";
          btn.innerHTML = `<i class="fa fa-eye"></i> عرض الكود`;

          card.appendChild(preview);
          card.appendChild(btn);

          if (data.isNew) {
            const badge = document.createElement("div");
            badge.className = "badge";
            badge.innerText = "NEW";
            card.appendChild(badge);
          }

          container.appendChild(card);
        });

        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = end >= allCodes.length;
      }

      const db = firebase.database();
      db.ref("codes").orderByKey().once("value", (snapshot) => {
        snapshot.forEach((child) => {
          allCodes.push({ key: child.key, data: child.val() });
        });
        allCodes.reverse();
        renderPage();
        document.getElementById("totalCount").innerText = allCodes.length;
      });

      document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        if ((currentPage * itemsPerPage) < allCodes.length) {
          currentPage++;
          renderPage();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
