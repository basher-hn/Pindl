<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CSS Codes VIP – Green Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* الستايل الأخضر VIP 3D المطور للواجهة */
    :root {
      --primary-green: #00b894;
      --bg-color: #f0f3f7;
      --shadow-light: #ffffff;
      --shadow-dark: #d1d9e6;
    }

    body {
      background: var(--bg-color);
      font-family: 'Cairo', sans-serif;
      text-align: center;
      margin: 0;
      padding: 15px;
      color: #333;
    }

    /* هيدر الواجهة 3D */
    .main-header {
      background: var(--bg-color);
      padding: 25px 15px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
      border-bottom: 4px solid var(--primary-green);
    }

    .main-title {
      font-size: 26px;
      font-weight: 900;
      color: #222;
      margin: 0 0 10px 0;
    }

    .logo-circle {
      background: var(--primary-green);
      color: white;
      font-size: 22px;
      font-weight: bold;
      width: 90px;
      height: 90px;
      margin: 10px auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 5px 5px 15px rgba(0, 184, 148, 0.3);
    }

    #codeCount {
      background: var(--bg-color);
      padding: 8px 20px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 20px;
      font-weight: bold;
      color: var(--primary-green);
      box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
    }

    /* نظام عرض الكروت */
    #codesContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--bg-color);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      border-right: 5px solid var(--primary-green);
      box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      transition: 0.3s ease;
      text-align: right;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .preview {
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: inset 4px 4px 8px var(--shadow-dark);
      min-height: 80px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .btn {
      background: var(--primary-green);
      color: white;
      padding: 12px;
      font-weight: bold;
      border-radius: 10px;
      text-decoration: none;
      display: block;
      text-align: center;
      box-shadow: 4px 4px 10px rgba(0, 184, 148, 0.2);
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.9;
      box-shadow: inset 3px 3px 6px rgba(0,0,0,0.1);
    }

    .badge {
      background: #e60023;
      color: white;
      font-size: 10px;
      padding: 4px 10px;
      position: absolute;
      top: 10px;
      left: 10px;
      border-radius: 4px;
      font-weight: bold;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* الترقيم 3D */
    .pagination {
      margin: 40px 0;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .pagination button {
      padding: 12px 25px;
      background: var(--bg-color);
      color: var(--primary-green);
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light);
    }

    .pagination button:disabled {
      opacity: 0.4;
      box-shadow: none;
      cursor: not-allowed;
    }

</style>
</head>
<body oncontextmenu="return false;"> 

  <div class="main-header">
    <h1 class="main-title">
      Css•<span style="color:var(--primary-green)">Basher</span>•Wapka
    </h1>
    <div class="logo-circle">C•B•W</div>
  </div>

  <div id="codeCount">
    <i class="fa fa-layer-group"></i> عدد الأكواد: <span id="totalCount">0</span>
  </div>

  <div id="codesContainer"></div>

  <div class="pagination">
    <button id="prevBtn">السابق</button>
    <button id="nextBtn">التالي</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    /* 🛡️ حماية CoOoBRA VIP */
    document.onkeydown = function(e) {
      if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };

    const firebaseConfig = {
      apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
      authDomain: "soudfa-9a558.firebaseapp.com",
      databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
      projectId: "soudfa-9a558",
      storageBucket: "soudfa-9a558.appspot.com",
      messagingSenderId: "272066911729",
      appId: "1:272066911729:web:000fdba21e4b1d7ffcb82c"
    };

    firebase.initializeApp(firebaseConfig);

    window.addEventListener("DOMContentLoaded", function () {
      let allCodes = [];
      let currentPage = 1;
      const itemsPerPage = 10;
      const container = document.getElementById('codesContainer');

      function renderPage() {
        container.innerHTML = '';
        const start = (currentPage - 1) * itemsPerPage;
        const end = start + itemsPerPage;
        const pageItems = allCodes.slice(start, end);

        pageItems.forEach(({ key, data }) => {
          const card = document.createElement("div");
          card.className = "card";

          const preview = document.createElement("div");
          preview.className = "preview";
          preview.innerHTML = data.previewHTML;

          const btn = document.createElement("a");
          btn.href = `copy.html?id=${key}`;
          btn.className = "btn";
          btn.innerHTML = `<i class="fa fa-eye"></i> عرض الكود`;

          card.appendChild(preview);
          card.appendChild(btn);

          if (data.isNew) {
            const badge = document.createElement("div");
            badge.className = "badge";
            badge.innerText = "NEW";
            card.appendChild(badge);
          }

          container.appendChild(card);
        });

        document.getElementById("prevBtn").disabled = currentPage === 1;
        document.getElementById("nextBtn").disabled = end >= allCodes.length;
      }

      const db = firebase.database();
      db.ref("codes").orderByKey().once("value", (snapshot) => {
        snapshot.forEach((child) => {
          allCodes.push({ key: child.key, data: child.val() });
        });
        allCodes.reverse();
        renderPage();
        document.getElementById("totalCount").innerText = allCodes.length;
      });

      document.getElementById("prevBtn").addEventListener("click", () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        if ((currentPage * itemsPerPage) < allCodes.length) {
          currentPage++;
          renderPage();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    });
  </script>
</body>
</html>
