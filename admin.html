<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم VIP – Green Edition</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary-green: #00b894;
      --bg-color: #f0f3f7;
      --shadow-light: #ffffff;
      --shadow-dark: #d1d9e6;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg-color);
      margin: 0;
      padding: 15px;
      color: #2d3436;
      /* السماح بالاختيار والنسخ في لوحة الأدمن */
      user-select: text !important;
      -webkit-user-select: text !important;
    }

    .header {
      background: var(--bg-color);
      border-radius: 12px;
      text-align: center;
      padding: 20px;
      margin-bottom: 25px;
      box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
      border-right: 5px solid var(--primary-green);
    }

    .logo-circle {
      background: var(--primary-green);
      color: #fff;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 10px;
      font-size: 18px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3);
    }

    .form {
      background: var(--bg-color);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
      border-right: 5px solid var(--primary-green);
    }

    textarea, input, select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.05);
      background: var(--bg-color);
      font-size: 15px;
      box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
      box-sizing: border-box;
      margin-bottom: 15px;
      outline: none;
      font-family: 'Cairo';
    }

    .btn-row { display: flex; gap: 10px; margin-top: 10px; }

    button {
      flex: 1;
      padding: 15px;
      border-radius: 10px;
      font-weight: 900;
      cursor: pointer;
      font-family: 'Cairo';
      border: none;
      transition: 0.2s;
    }

    .btn-save { background: var(--primary-green); color: white; box-shadow: 4px 4px 10px var(--shadow-dark); }
    .btn-logout { background: var(--bg-color); color: #e74c3c; box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light); }
    .btn-cancel { background: #95a5a6; color: white; display: none; }
    
    button:active { transform: scale(0.96); box-shadow: inset 2px 2px 5px var(--shadow-dark); }

    .code-item {
      background: var(--bg-color);
      border-radius: 12px;
      margin-bottom: 20px;
      padding: 18px;
      box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
      border-right: 4px solid var(--primary-green);
      overflow: hidden;
    }

    pre.code-box {
      background: #2d3436;
      color: #00b894;
      padding: 15px;
      border-radius: 8px;
      font-size: 13px;
      direction: ltr;
      white-space: pre-wrap;
      word-break: break-all;
      box-shadow: inset 4px 4px 10px #000;
      margin: 10px 0;
      user-select: all; /* يسهل عليك تحديد الكود كله بلمسة */
    }

    #loginBox {
      max-width: 350px;
      margin: 80px auto;
      background: var(--bg-color);
      padding: 30px;
      border-radius: 15px;
      box-shadow: 15px 15px 30px var(--shadow-dark);
      text-align: center;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

<div class="header">
  <div style="font-weight:900; font-size:20px;">Css•<span style='color:var(--primary-green)'>Basher</span>•Wapka</div>
  <div class="logo-circle">C•B•W</div>
</div>

<div id="loginBox">
  <h3 style="color:var(--primary-green)">دخول القائد</h3>
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة المرور">
  <button class="btn-save" style="width:100%" onclick="login()">دخول</button>
</div>

<div id="adminPanel" class="hidden">
  <div class="form">
    <h3 id="formTitle" style="color:var(--primary-green)">➕ إضافة كود جديد</h3>
    <input type="hidden" id="editKey">
    <input type="text" id="previewHTML" placeholder="كود HTML للمعاينة">
    <textarea id="cssCode" rows="5" placeholder="كود CSS"></textarea>
    <select id="isNew">
      <option value="true">✅ جديد</option>
      <option value="false">❌ عادي</option>
    </select>
    <div class="btn-row">
      <button class="btn-logout" onclick="logout()">خروج</button>
      <button class="btn-cancel" id="cancelBtn" onclick="resetForm()">إلغاء</button>
      <button class="btn-save" onclick="saveCode()">حفظ البيانات</button>
    </div>
  </div>
  <div id="codesList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
    authDomain: "soudfa-9a558.firebaseapp.com",
    databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
    projectId: "soudfa-9a558",
    storageBucket: "soudfa-9a558.appspot.com",
    messagingSenderId: "889312889458",
    appId: "1:889312889458:web:2f7086b73e5bda0328e01a"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth(), db = firebase.database();

  function login() {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
      .catch(() => alert("خطأ بالبيانات"));
  }

  function logout() { auth.signOut().then(() => location.reload()); }

  auth.onAuthStateChanged(user => {
    if (user) { 
      document.getElementById("loginBox").classList.add("hidden"); 
      document.getElementById("adminPanel").classList.remove("hidden"); 
      loadCodes(); 
    }
  });

  function saveCode() {
    const key = document.getElementById("editKey").value;
    const data = {
      previewHTML: document.getElementById("previewHTML").value,
      cssCode: document.getElementById("cssCode").value,
      isNew: document.getElementById("isNew").value === "true"
    };
    if(!data.previewHTML || !data.cssCode) return alert("املأ الحقول");
    const ref = key ? db.ref("codes/" + key) : db.ref("codes").push();
    ref.set(data).then(() => { resetForm(); loadCodes(); alert("تم الحفظ بنجاح ✅"); });
  }

  function loadCodes() {
    db.ref("codes").on("value", snapshot => {
      const list = document.getElementById("codesList"); list.innerHTML = "";
      snapshot.forEach(child => {
        const d = child.val();
        const div = document.createElement("div");
        div.className = "code-item";
        div.innerHTML = `
          <div style="margin-bottom:10px; font-weight:bold;">${d.previewHTML}</div>
          <pre class="code-box">${d.cssCode}</pre>
          <div class="btn-row">
            <button style="background:var(--primary-green); color:#fff" onclick="triggerEdit('${child.key}')">تعديل</button>
            <button style="background:#e74c3c; color:#fff" onclick="deleteCode('${child.key}')">حذف</button>
          </div>`;
        list.appendChild(div);
      });
    });
  }

  // التعديل المضمون بالسحب المباشر لتجنب أخطاء النسخ
  function triggerEdit(key) {
    db.ref("codes/" + key).once("value").then(snap => {
      const d = snap.val();
      document.getElementById("editKey").value = key;
      document.getElementById("previewHTML").value = d.previewHTML;
      document.getElementById("cssCode").value = d.cssCode;
      document.getElementById("isNew").value = d.isNew ? "true" : "false";
      
      document.getElementById("formTitle").innerText = "✏️ تعديل الكود الحالي";
      document.getElementById("cancelBtn").style.display = "block";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  function deleteCode(key) { if(confirm("حذف هذا الكود نهائياً؟")) db.ref("codes/"+key).remove(); }
  
  function resetForm() {
    document.getElementById("editKey").value = "";
    document.getElementById("previewHTML").value = "";
    document.getElementById("cssCode").value = "";
    document.getElementById("isNew").value = "true";
    document.getElementById("formTitle").innerText = "➕ إضافة كود جديد";
    document.getElementById("cancelBtn").style.display = "none";
  }
</script>
</body>
</html>
