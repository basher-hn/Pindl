<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة التحكم VIP – Css Basher</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Cairo', sans-serif; background: #0a0a0a; margin: 0; padding: 20px; color: #fff; direction: rtl; }
    .header-vip { background: #111; border-radius: 8px; border-bottom: 3px solid #3498db; text-align: center; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .logo-circle-vip { background: #000; color: #3498db; width: 80px; height: 80px; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 10px auto; font-size: 22px; border: 2px solid #3498db; box-shadow: 0 0 15px rgba(52, 152, 219, 0.3); }
    .form-vip { background: #111; padding: 25px; border-radius: 8px; border-right: 4px solid #3498db; margin: 0 auto 25px auto; max-width: 700px; box-shadow: 10px 10px 20px #050505; }
    textarea, input, select { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid #222; background: #080808; color: #fff; margin-bottom: 15px; box-shadow: inset 4px 4px 8px #000; box-sizing: border-box; outline: none; transition: 0.3s; }
    textarea:focus, input:focus { border-color: #3498db; }
    .btn-group-vip { display: flex; gap: 10px; }
    button { flex: 1; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; border: none; font-family: 'Cairo', sans-serif; }
    .btn-save-vip { background: #3498db; color: #fff; box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
    .btn-logout-vip { background: #1a1a1a; color: #e74c3c; border: 1px solid #e74c3c; }
    .code-item-vip { background: #111; border-radius: 8px; border-right: 4px solid #3498db; margin-bottom: 20px; padding: 20px; box-shadow: 5px 5px 15px #050505; }
    pre.code-box-vip { background: #050505; padding: 15px; border-radius: 8px; overflow-x: auto; color: #3498db; box-shadow: inset 3px 3px 10px #000; direction: ltr; }
    .hidden { display: none; }
</style>
</head>
<body>

<div class="header-vip">
  <div style="font-weight:bold; font-size:22px;">Css•<span style='color:#3498db'>Basher</span>•Wapka</div>
  <div class="logo-circle-vip">C•B•W</div>
</div>

<div id="loginBox">
  <div class="form-vip" style="max-width: 400px;">
    <h2 style="text-align:center;">دخول الأدمن VIP</h2>
    <div id="loginError" style="color:#e74c3c; text-align:center; margin-bottom:10px;"></div>
    <input type="email" id="email" placeholder="البريد الإلكتروني">
    <input type="password" id="password" placeholder="كلمة المرور">
    <button class="btn-save-vip" onclick="login()">دخول للمنصة</button>
  </div>
</div>

<div id="adminPanel" class="hidden">
  <div class="form-vip">
    <h3><i class="fa fa-edit"></i> إضافة / تعديل كود</h3>
    <input type="hidden" id="editKey" />
    <input type="text" id="previewHTML" placeholder="كود المعاينة HTML">
    <textarea id="cssCode" rows="5" placeholder="كود الـ CSS"></textarea>
    <select id="isNew">
      <option value="true">✅ جديد (NEW)</option>
      <option value="false">❌ عادي</option>
    </select>
    <div class="btn-group-vip">
      <button class="btn-logout-vip" onclick="logout()">خروج</button>
      <button class="btn-save-vip" onclick="saveCode()">حفظ البيانات</button>
    </div>
  </div>
  <div id="codesList" style="max-width:700px; margin:auto;"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
    authDomain: "soudfa-9a558.firebaseapp.com",
    databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
    projectId: "soudfa-9a558",
    storageBucket: "soudfa-9a558.appspot.com",
    messagingSenderId: "889312889458",
    appId: "1:889312889458:web:2f7086b73e5bda0328e01a"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  function login() {
    auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
      .catch(e => document.getElementById("loginError").innerText = "❌ خطأ بالبيانات");
  }

  function logout() { auth.signOut().then(() => location.reload()); }

  auth.onAuthStateChanged(user => {
    if (user) { document.getElementById("loginBox").classList.add("hidden"); document.getElementById("adminPanel").classList.remove("hidden"); loadCodes(); }
  });

  function saveCode() {
    const key = document.getElementById("editKey").value;
    const data = {
      previewHTML: document.getElementById("previewHTML").value,
      cssCode: document.getElementById("cssCode").value,
      isNew: document.getElementById("isNew").value === "true"
    };
    const ref = key ? db.ref("codes/" + key) : db.ref("codes").push();
    ref.set(data).then(() => { resetForm(); loadCodes(); });
  }

  function loadCodes() {
    db.ref("codes").on("value", snap => {
      const list = document.getElementById("codesList"); list.innerHTML = "";
      snap.forEach(child => {
        const d = child.val();
        const div = document.createElement("div");
        div.className = "code-item-vip";
        div.innerHTML = `<div>${d.previewHTML}</div><pre class="code-box-vip">${d.cssCode}</pre>
          <div class="btn-group-vip">
            <button style="background:#007bff; color:#fff;" onclick="editCode('${child.key}', \`${d.previewHTML}\`, \`${d.cssCode}\`, ${d.isNew})">تعديل</button>
            <button style="background:#dc3545; color:#fff;" onclick="deleteCode('${child.key}')">حذف</button>
          </div>`;
        list.appendChild(div);
      });
    });
  }

  function editCode(key, html, css, isNew) {
    document.getElementById("editKey").value = key;
    document.getElementById("previewHTML").value = html;
    document.getElementById("cssCode").value = css;
    document.getElementById("isNew").value = isNew ? "true" : "false";
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function deleteCode(key) { if(confirm("حذف؟")) db.ref("codes/"+key).remove(); }
  function resetForm() { document.getElementById("editKey").value = ""; document.getElementById("previewHTML").value = ""; document.getElementById("cssCode").value = ""; }
</script>
</body>
</html>
