<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard Ultra VIP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    /* التصميم الزجاجي الخرافي - Ultra Futuristic */
    :root {
      --primary: #3498db;
      --bg: #050505;
      --card-bg: rgba(20, 20, 20, 0.7);
    }

    body {
      background: var(--bg);
      background-image: 
        radial-gradient(circle at 10% 20%, rgba(52, 152, 219, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 90% 80%, rgba(52, 152, 219, 0.1) 0%, transparent 20%);
      font-family: 'Cairo', sans-serif;
      margin: 0;
      padding: 20px;
      color: #fff;
      overflow-x: hidden;
    }

    /* هيدر النيون العائم */
    .header-ultra {
      background: var(--card-bg);
      backdrop-filter: blur(15px);
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.5), inset 0 0 20px rgba(52,152,219,0.1);
      border-bottom: 2px solid var(--primary);
    }

    .logo-glow {
      width: 90px;
      height: 90px;
      background: #000;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid var(--primary);
      box-shadow: 0 0 25px var(--primary), inset 0 0 15px var(--primary);
      font-size: 24px;
      font-weight: 900;
      color: #fff;
      animation: pulse-glow 2s infinite;
    }

    @keyframes pulse-glow {
      0% { box-shadow: 0 0 15px var(--primary); }
      50% { box-shadow: 0 0 35px var(--primary); }
      100% { box-shadow: 0 0 15px var(--primary); }
    }

    /* فورم التحكم المحفور */
    .ultra-form {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 8px;
      max-width: 750px;
      margin: 0 auto 40px;
      border-right: 6px solid var(--primary);
      box-shadow: 15px 15px 30px #000;
    }

    .input-group {
      position: relative;
      margin-bottom: 25px;
    }

    .input-group label {
      display: block;
      color: var(--primary);
      font-weight: bold;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .ultra-input {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.05);
      padding: 16px;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      box-shadow: inset 4px 4px 10px #000;
      box-sizing: border-box;
      transition: 0.4s;
    }

    .ultra-input:focus {
      border-color: var(--primary);
      box-shadow: inset 2px 2px 5px #000, 0 0 15px rgba(52,152,219,0.2);
    }

    /* أزرار النيون 3D */
    .btn-ultra {
      padding: 15px 35px;
      border-radius: 8px;
      border: none;
      font-weight: 900;
      cursor: pointer;
      transition: 0.4s;
      font-family: 'Cairo';
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-save {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 0 20px rgba(52,152,219,0.4);
    }

    .btn-save:hover {
      box-shadow: 0 0 40px var(--primary);
      transform: scale(1.05);
    }

    /* كروت الأكواد المرفوعة */
    .code-card-ultra {
      background: rgba(15, 15, 15, 0.8);
      border-radius: 8px;
      margin-bottom: 25px;
      padding: 25px;
      border: 1px solid rgba(255,255,255,0.02);
      box-shadow: 10px 10px 25px #000;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .code-display {
      background: #000;
      border-radius: 8px;
      padding: 15px;
      border: 1px solid #111;
      box-shadow: inset 4px 4px 12px #000;
      color: var(--primary);
      font-family: monospace;
      font-size: 13px;
      overflow-x: auto;
    }

    .hidden { display: none; }
  </style>
</head>
<body oncontextmenu="return false;"> <div class="header-ultra">
    <div class="logo-glow">C•B•W</div>
    <h1 style="margin:0; font-weight:900; letter-spacing:2px;">DASHBOARD <span style="color:var(--primary)">ULTRA VIP</span></h1>
  </div>

  <div id="loginBox" class="ultra-form" style="max-width:400px; text-align:center;">
    <h2 style="color:var(--primary)">ACCESS DENIED</h2>
    <p style="font-size:12px; opacity:0.6;">يرجى إثبات هويتك للدخول إلى غرفة العمليات</p>
    <div id="loginError" style="color:#ff4757; font-size:12px; margin-bottom:10px;"></div>
    <input type="email" id="email" class="ultra-input" placeholder="البريد الإلكتروني" style="margin-bottom:15px;">
    <input type="password" id="password" class="ultra-input" placeholder="كلمة المرور" style="margin-bottom:20px;">
    <button class="btn-ultra btn-save" onclick="login()">دخول القائد</button>
  </div>

  <div id="adminPanel" class="hidden">
    <div class="ultra-form">
      <h3><i class="fa fa-terminal" style="margin-left:10px;"></i> إضافة كود جديد</h3>
      <input type="hidden" id="editKey">
      
      <div class="input-group">
        <label>المعاينة الذكية (HTML):</label>
        <input type="text" id="previewHTML" class="ultra-input" placeholder="أدخل كود المعاينة هنا...">
      </div>

      <div class="input-group">
        <label>كود الـ CSS الملكي:</label>
        <textarea id="cssCode" class="ultra-input" rows="6" placeholder="اكتب كود الـ CSS هنا..."></textarea>
      </div>

      <div style="display:flex; justify-content:space-between; align-items:center;">
        <select id="isNew" class="ultra-input" style="width:150px; margin:0;">
          <option value="true">✅ جديد</option>
          <option value="false">❌ قديم</option>
        </select>
        <div style="display:flex; gap:10px;">
          <button class="btn-ultra" style="background:#111; color:#ff4757; border:1px solid #ff4757;" onclick="logout()">خروج</button>
          <button class="btn-ultra btn-save" onclick="saveCode()">حفظ في السيرفر</button>
        </div>
      </div>
    </div>

    <div id="codesList" style="max-width:750px; margin:0 auto;">
      <h3 style="text-align:center; color:var(--primary); margin-bottom:30px;">ARCHIVE DATABASE</h3>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script>
    /* 🛡️ درع الحماية VIP - تم التشفير والدمج */
    document.onkeydown = function(e) {
      if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };
    
    const firebaseConfig = {
      apiKey: "AIzaSyB_IgmKCUS35ooOzzEYaQuidxgrXCHGGtU",
      authDomain: "soudfa-9a558.firebaseapp.com",
      databaseURL: "https://soudfa-9a558-default-rtdb.firebaseio.com",
      projectId: "soudfa-9a558",
      storageBucket: "soudfa-9a558.appspot.com",
      messagingSenderId: "889312889458",
      appId: "1:889312889458:web:2f7086b73e5bda0328e01a"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth(), db = firebase.database();

    function login() {
      auth.signInWithEmailAndPassword(document.getElementById("email").value, document.getElementById("password").value)
        .catch(e => document.getElementById("loginError").innerText = "❌ بيانات الدخول غير مصرح بها");
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    auth.onAuthStateChanged(user => {
      if (user) { 
        document.getElementById("loginBox").classList.add("hidden"); 
        document.getElementById("adminPanel").classList.remove("hidden"); 
        loadCodes(); 
      }
    });

    function saveCode() {
      const key = document.getElementById("editKey").value;
      const data = {
        previewHTML: document.getElementById("previewHTML").value,
        cssCode: document.getElementById("cssCode").value,
        isNew: document.getElementById("isNew").value === "true"
      };
      if(!data.previewHTML || !data.cssCode) return;
      const ref = key ? db.ref("codes/" + key) : db.ref("codes").push();
      ref.set(data).then(() => { resetForm(); loadCodes(); });
    }

    function loadCodes() {
      db.ref("codes").on("value", snap => {
        const list = document.getElementById("codesList"); list.innerHTML = "";
        snap.forEach(child => {
          const d = child.val();
          const div = document.createElement("div");
          div.className = "code-card-ultra";
          div.innerHTML = `
            <div>${d.previewHTML}</div>
            <pre class="code-display">${d.cssCode}</pre>
            <div style="display:flex; gap:10px;">
              <button class="btn-ultra" style="background:var(--primary); color:#fff; padding:8px 20px; font-size:12px;" onclick="editCode('${child.key}', \`${d.previewHTML}\`, \`${d.cssCode}\`, ${d.isNew})">تعديل</button>
              <button class="btn-ultra" style="background:#ff4757; color:#fff; padding:8px 20px; font-size:12px;" onclick="deleteCode('${child.key}')">حذف</button>
            </div>`;
          list.appendChild(div);
        });
      });
    }

    function editCode(k, h, c, n) {
      document.getElementById("editKey").value = k;
      document.getElementById("previewHTML").value = h;
      document.getElementById("cssCode").value = c;
      document.getElementById("isNew").value = n ? "true" : "false";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteCode(k) { if(confirm("تأكيد تدمير الكود من القاعدة؟")) db.ref("codes/"+k).remove(); }
    function resetForm() { document.getElementById("editKey").value = ""; document.getElementById("previewHTML").value = ""; document.getElementById("cssCode").value = ""; }
  </script>
</body>
</html>
